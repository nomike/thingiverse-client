# Publish thingiverse-client to PyPI when a GitHub release is published.
# Requires PyPI trusted publishing: add this repo as a trusted publisher at
# https://pypi.org/manage/project/thingiverse-client/settings/publishing/
# (Owner, Repo name, Workflow: publish-pypi.yml)

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for PyPI trusted publishing (OIDC)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Optional: uncomment to use a GitHub environment for approval gates
    # environment: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # Do not fail if this version is already published
          verbose: true
